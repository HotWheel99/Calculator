<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="icon" href="img/icons8-calculator-48.png">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="calculator">
        <section class="calculator__section">
            <div class="numbers">
                <div>
                    <input type="text" class="number1 num">
                    <input type="text" class="number2 num">
                </div>
                <input type="text" class="num resoult" disabled>
            </div>

            <div class="btns">
                <div class="btn__container">
                    <button class="btn btn-plus"><i class="fa-solid fa-plus fa-3x"></i></button>
                    <button class="btn btn-minus"><i class="fa-solid fa-minus fa-3x"></i></button>
                </div>

                <div>
                    <button class="btn btn-mul"><i class="fa-solid fa-xmark fa-3x"></i></button>
                    <button class="btn btn-div"><i class="fa-solid fa-divide fa-3x"></i></button>
                </div>
            </div>
        </section>
        <button class="ac-btn">AC</button>
    </main>

    <script src="script.js"></script>
    <script src="https://kit.fontawesome.com/8f75d5a675.js" crossorigin="anonymous"></script>
</body>

</html>
